name: Publish to MCP Registry

# Publishes every packages/*/server.json to the official MCP Registry.
# Trigger: release tags (v*) or manual dispatch (re-sync after description edits).
# Namespace dev.cz-agents/* is DNS-verified -> `login dns` with the Ed25519 key
# stored as the MCP_PRIVATE_KEY repo secret (never echoed).
#
# ponytail: each run tries all 9 packages; a package whose server.json version
# already exists in the registry fails only its own publish and is skipped (loop
# never exits non-zero). To (re)publish a package, bump its
# packages/<name>/server.json "version". The npm package version referenced in
# server.json must already be on npm — the registry validates it exists.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate (DNS namespace dev.cz-agents)
        run: ./mcp-publisher login dns --domain cz-agents.dev --private-key "${{ secrets.MCP_PRIVATE_KEY }}"

      - name: Publish each package
        run: |
          PUB="$PWD/mcp-publisher"
          skipped=0
          for f in packages/*/server.json; do
            dir=$(dirname "$f"); name=$(basename "$dir")
            echo "::group::publish $name"
            if ( cd "$dir" && "$PUB" publish ); then
              echo "OK  $name published"
            else
              echo "SKIP $name (version already in registry or npm validation failed)"
              skipped=$((skipped + 1))
            fi
            echo "::endgroup::"
          done
          echo "Done — $skipped package(s) skipped."
