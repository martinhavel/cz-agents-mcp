services:
  ares:
    build:
      context: .
      dockerfile: packages/ares/Dockerfile
    image: cz-agents-ares:latest
    container_name: cz-agents-ares
    restart: unless-stopped
    ports:
      - "127.0.0.1:3030:3030"
    environment:
      - PORT=3030
      - NODE_ENV=production
      - RATE_LIMIT_MAX=600
      - ICO_DAILY_CAP=60
      - QUERY_DAILY_CAP=25
      - LOOKUP_HASH_SALT=${LOOKUP_HASH_SALT}
      - SANDBOX_HMAC_SECRET=${SANDBOX_HMAC_SECRET}
      - TOOL_EVENTS_DIR=/var/lib/czagents-events
    volumes:
      - tool-events:/var/lib/czagents-events
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - default
      - apache

  cnb:
    build:
      context: .
      dockerfile: packages/cnb/Dockerfile
    image: cz-agents-cnb:latest
    container_name: cz-agents-cnb
    restart: unless-stopped
    ports:
      - "127.0.0.1:3031:3031"
    environment:
      - PORT=3031
      - NODE_ENV=production
      - RATE_LIMIT_MAX=600
      - ICO_DAILY_CAP=60
      - TOOL_EVENTS_DIR=/var/lib/czagents-events
    volumes:
      - tool-events:/var/lib/czagents-events
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3031/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - default
      - apache

  sanctions:
    build:
      context: .
      dockerfile: packages/sanctions/Dockerfile
    image: cz-agents-sanctions:latest
    container_name: cz-agents-sanctions
    restart: unless-stopped
    ports:
      - "127.0.0.1:3032:3030"
    environment:
      - PORT=3030
      - NODE_ENV=production
      - SANCTIONS_DB=/var/lib/czagents-sanctions/sanctions.db
      - TOKEN_DB=/var/lib/czagents-tokens/tokens.db
      - SANCTIONS_EU_URL=${SANCTIONS_EU_URL:-https://webgate.ec.europa.eu/fsd/fsf/public/files/xmlFullSanctionsList_1_1/content?token=dG9rZW4tMjAxNw}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET_SANCTIONS:-}
      - RATE_LIMIT_MAX=600
      - ICO_DAILY_CAP=60
      - QUERY_DAILY_CAP=25
      - LOOKUP_HASH_SALT=${LOOKUP_HASH_SALT}
      - TOOL_EVENTS_DIR=/var/lib/czagents-events
    volumes:
      - sanctions-data:/var/lib/czagents-sanctions
      - tokens-data:/var/lib/czagents-tokens
      - tool-events:/var/lib/czagents-events
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - default
      - apache

  dd:
    build:
      context: .
      dockerfile: packages/dd/Dockerfile
    image: cz-agents-dd:latest
    container_name: cz-agents-dd
    restart: unless-stopped
    ports:
      - "127.0.0.1:3033:3030"
    environment:
      - PORT=3030
      - NODE_ENV=production
      - SANCTIONS_DB=/var/lib/czagents-sanctions/sanctions.db
      - TOKEN_DB=/var/lib/czagents-tokens/tokens.db
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET_DD:-}
      # Higher per-IP limit — Claude/Anthropic connectors fan out parallel
      # requests (initialize + tools/list + multiple tool calls + notifications)
      # in seconds. The 30/min default routinely hits 429 in single chat turn.
      - RATE_LIMIT_MAX=600
      - ICO_DAILY_CAP=60
      - QUERY_DAILY_CAP=25
      - LOOKUP_HASH_SALT=${LOOKUP_HASH_SALT}
      - TOOL_EVENTS_DIR=/var/lib/czagents-events
      - MCP_AUDIT_URL=${MCP_AUDIT_URL:-}
      - MCP_AUDIT_KEY=${MCP_AUDIT_KEY:-}
    volumes:
      - sanctions-data:/var/lib/czagents-sanctions:ro
      - tokens-data:/var/lib/czagents-tokens
      - tool-events:/var/lib/czagents-events
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - default
      - apache

  isir:
    build:
      context: .
      dockerfile: packages/isir/Dockerfile
    image: cz-agents-isir:latest
    container_name: cz-agents-isir
    restart: unless-stopped
    ports:
      - "127.0.0.1:3034:3030"
    environment:
      - PORT=3030
      - NODE_ENV=production
      - ISIR_SOAP_ENABLED=1
      - RATE_LIMIT_MAX=600
      - ICO_DAILY_CAP=60
      - QUERY_DAILY_CAP=25
      - LOOKUP_HASH_SALT=${LOOKUP_HASH_SALT}
      - TOOL_EVENTS_DIR=/var/lib/czagents-events
    volumes:
      - tool-events:/var/lib/czagents-events
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - default
      - apache

  adis:
    build:
      context: .
      dockerfile: packages/adis/Dockerfile
    image: cz-agents-adis:latest
    container_name: cz-agents-adis
    restart: unless-stopped
    ports:
      - "127.0.0.1:3035:3030"
    environment:
      - PORT=3030
      - NODE_ENV=production
      - ADIS_SOAP_ENABLED=1
      - RATE_LIMIT_MAX=600
      - ICO_DAILY_CAP=60
      - TOOL_EVENTS_DIR=/var/lib/czagents-events
    volumes:
      - tool-events:/var/lib/czagents-events
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - default
      - apache

  sanctions-refresh:
    image: cz-agents-sanctions:latest
    container_name: cz-agents-sanctions-refresh
    restart: "no"
    profiles: ["cron"]
    environment:
      - SANCTIONS_DB=/var/lib/czagents-sanctions/sanctions.db
      - SANCTIONS_EU_URL=${SANCTIONS_EU_URL:-https://webgate.ec.europa.eu/fsd/fsf/public/files/xmlFullSanctionsList_1_1/content?token=dG9rZW4tMjAxNw}
    volumes:
      - sanctions-data:/var/lib/czagents-sanctions
    command: ["node", "packages/sanctions/dist/cli-refresh.js"]

  # 2026-05-08 — Reality MCP server (distress real estate intelligence).
  # Reads the live reality-webapp SQLite database (external volume
  # czagents_reality_webapp_data, owned by the reality webapp compose).
  # Mount is rw because the DB runs in WAL mode (readers need write access
  # to the -shm file); the MCP itself opens the DB readonly (db.ts).
  realestate:
    build:
      context: .
      dockerfile: packages/realestate/Dockerfile
    image: cz-agents-realestate:latest
    container_name: cz-agents-realestate
    restart: unless-stopped
    ports:
      - "127.0.0.1:3036:3036"
    environment:
      - PORT=3036
      - NODE_ENV=production
      - REALESTATE_DB_PATH=/data/webapp.db
      - TOKEN_DB=/var/lib/czagents-tokens/tokens.db
      - RATE_LIMIT_MAX=30
      - TOOL_EVENTS_DIR=/var/lib/czagents-events
    volumes:
      - czagents_reality_webapp_data:/data
      - tokens-data:/var/lib/czagents-tokens
      - tool-events:/var/lib/czagents-events
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3036/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - default
      - apache

  eu-registry:
    build:
      context: .
      dockerfile: packages/eu-registry/Dockerfile
    image: cz-agents-eu-registry:latest
    container_name: cz-agents-eu-registry
    restart: unless-stopped
    ports:
      - "127.0.0.1:3039:3030"
    environment:
      - PORT=3030
      - NODE_ENV=production
      - RATE_LIMIT_MAX=600
      - ICO_DAILY_CAP=60
      - QUERY_DAILY_CAP=25
      - LOOKUP_HASH_SALT=${LOOKUP_HASH_SALT}
      - CH_API_KEY=${CH_API_KEY:-}

      - GLEIF_CACHE_PATH=/var/lib/czagents-gleif-cache/cache.db
      - GLEIF_CACHE_TTL_DAYS=7
      - TOOL_EVENTS_DIR=/var/lib/czagents-events
    volumes:
      - gleif-cache:/var/lib/czagents-gleif-cache
      - tool-events:/var/lib/czagents-events
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - default
      - apache

  payqr:
    build:
      context: .
      dockerfile: packages/payqr/Dockerfile
    image: cz-agents-payqr:latest
    container_name: cz-agents-payqr
    restart: unless-stopped
    ports:
      - "127.0.0.1:3040:3040"
    environment:
      - PORT=3040
      - NODE_ENV=production
      - RATE_LIMIT_MAX=120
      - TOOL_EVENTS_DIR=/var/lib/czagents-events
    volumes:
      - tool-events:/var/lib/czagents-events
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3040/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - default
      - apache

networks:
  default:
  apache:
    external: true
    name: apache_default

volumes:
  tool-events:
  sanctions-data:
  tokens-data:
  gleif-cache:
  czagents_reality_webapp_data:
    external: true
